input {
  # Receive logs from application (beats/direct)
  beats {
    port => 5044
  }

  # TCP input for direct log shipping from Node.js winston
  tcp {
    port  => 5000
    codec => json_lines
  }

  # File input for log files
  file {
    path  => "/var/log/disaster/*.log"
    start_position => "beginning"
    codec => "json"
    tags  => ["disaster-response", "file-input"]
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  # Add timestamp if missing
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse HTTP access logs
  if [type] == "nginx" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:time}\] "%{WORD:method} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code} %{NUMBER:bytes}'
      }
    }
    mutate {
      convert => { "response_code" => "integer", "bytes" => "integer" }
    }
  }

  # Tag critical/error logs
  if [level] == "error" or [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }
  if [level] == "warn" or [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  # Enrich with geo IP for client requests
  if [ip_address] {
    geoip {
      source => "ip_address"
      target => "geo"
    }
  }

  # Remove sensitive fields
  mutate {
    remove_field => ["password", "password_hash", "token", "Authorization"]
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index    => "disaster-logs-%{+YYYY.MM.dd}"
    template_name => "disaster-logs"
    ilm_enabled   => true
    ilm_rollover_alias => "disaster-logs"
    ilm_pattern    => "{now/d}-000001"
    ilm_policy     => "disaster-logs-policy"
  }

  # Also output errors to a dedicated index
  if "error" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "disaster-errors-%{+YYYY.MM.dd}"
    }
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
