databases:
  # 1. Managed PostgreSQL Database
  - name: disaster-db
    plan: free

services:

  # 2. Node.js Backend API
  - type: web
    name: disaster-backend
    env: node
    plan: free
    region: oregon 
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: disaster-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # 3. React Frontend (Static Site)
  - type: web
    name: disaster-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./build"
    # Route all 404s back to index.html to support React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: disaster-backend
          envVarKey: RENDER_EXTERNAL_URL
